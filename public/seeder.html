            let color = 'text-slate-400';

            if (type === 'error') color = 'text-red-600';

            logEl.innerHTML += `<div class="${color}">[${time}] > ${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

            try {
                log('Initiating Admin Node 1 registration...');
                const salt = dcodeIO.bcrypt.genSaltSync(10);
                const hashedPassword = dcodeIO.bcrypt.hashSync('shri25', salt);

                await db.collection('users').doc('Buildverse').set({
                    username: 'Buildverse',
                    password: hashedPassword,
                    role: 'admin',
                    activeSessionId: null,

                log('SUCCESS: Admin Node 1 [Buildverse] established.', 'success');

        document.getElementById('seed-items-btn').onclick = async () => {
            try {
                log('Starting resource matrix injection...');
                const batch = db.batch();


                components.forEach(item => {
                    const slug = item.name.toLowerCase().replace(/[^a-z0-9]/g, '_');
                    const ref = db.collection('components').doc(slug);
                    batch.set(ref, {
                        ...item,
                        availableQuantity: item.totalQuantity
                    });
                });

                await batch.commit();
                log(`SUCCESS: ${components.length} resources synchronized.`, 'success');
            } catch (e) { log('ERR: ' + e.message, 'error'); }
        };
